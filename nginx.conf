# 反向代理（挂载为 nginx 主配置 /etc/nginx/nginx.conf）。
# 因整文件替换主配置，必须包含 events{} / http{} 外层（原模板片段缺这两层会启动失败）。
#
# 路由要点：
#   /health    → API（健康检查在 API 根路径，非 /api 前缀；满足 curl http://localhost/health）
#   /api/      → API（含 SSE：/api/v1/trips/{id}/stream，需关闭缓冲 + 长读超时）
#   /          → Streamlit（WebSocket 升级）

worker_processes auto;
events { worker_connections 1024; }

http {
    upstream api       { server api:8000; }
    upstream streamlit { server streamlit:8501; }

    server {
        listen 80;

        # 健康检查（API 根路径）。
        location = /health {
            proxy_pass http://api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Prometheus 指标（可选直抓）。
        location = /metrics {
            proxy_pass http://api;
            proxy_set_header Host $host;
        }

        # API + SSE 流。SSE 需关闭代理缓冲，token 才能即时透传。
        location /api/ {
            proxy_pass http://api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_http_version 1.1;
            proxy_buffering off;
            proxy_read_timeout 300s;
        }

        # Streamlit（WebSocket 长连接：必须升级 Upgrade/Connection）。
        location / {
            proxy_pass http://streamlit;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 86400s;
        }
    }
}
